<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Plata - Consultar Saldo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../SaldoActual/saldoActual.css">
</head>
<body>

<div class="header">
<div class="sub-header">
  <div class="logo"><img src="../IMAGENES/LOGO.png" alt="Logo Mi Plata"> Mi Plata</div>
  <div class="nav">
    <a href="#" class="Profile" id="perfilLink">Perfil</a>
    <a href="#" class="logout" id="logoutLink">Cerrar Sesión</a>
  </div>
</div>
</div>

<div class="container">

  <a class="back" href="../Principal/principal.html" id="backLink">← Volver al panel</a>

  <div class="title">Consultar Saldo</div>
  <div class="subtitle">Visualiza el saldo de tus cuentas</div>

  <div class="selector">
    <span class="selector-label">Selecciona una cuenta</span>
    <div class="opts" id="optsContainer"></div>
  </div>

  <div class="saldo-card" id="saldoCard" style="display: none;">
    <div class="saldo-info">
      <div class="acc-type" id="accType"></div>
      <div class="acc-num" id="accNum"></div>
      <div class="label">Saldo Disponible</div>
      <div class="amount" id="amount"></div>
      <div class="date" id="date"></div>
    </div>
    <div class="eye" id="eyeBtn">👁</div>
  </div>

  <div class="info-grid" id="infoGrid"></div>
  
  <div id="mensaje" style="display: none; text-align: center; padding: 40px; background: #f5f5f5; border-radius: 16px; margin-top: 20px;"></div>

</div>

<script type="module" src="saldoActual.js"></script>
</body>
</html>
