<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Plata - Historial de Movimientos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="movimientos.css">
</head>
<body>

<div class="header">
    <div class="sub-header">
        <div class="logo"><img src="../IMAGENES/LOGO.png" alt="Logo Mi Plata"> Mi Plata</div>
        <div class="nav">
            <a href="#" class="Profile" id="perfilLink">Perfil</a>
            <a href="#" class="logout" id="logoutLink">Cerrar Sesión</a>
        </div>
    </div>
</div>

<div class="container">
    <div class="header-section">
        <div>
            <a class="back" href="../Principal/principal.html" id="backLink">← Volver al panel</a>
            <div class="title"><img src="../IMAGENES/MOVIMIENTOS.png" alt=""> Historial de Movimientos</div>
            <div class="subtitle">Todas tus transacciones en un solo lugar</div>
        </div>
        <button class="export-btn" id="exportBtn"><img src="../IMAGENES/EXPORTAR.png" alt=""> Exportar</button>
    </div>

    <div class="filter-section">
        <div class="filter-label">Filtrar por tipo</div>
        <div class="filter-buttons" id="filterButtons">
           <div class="filter-buttons" id="filterButtons">
                <button class="filter-btn active" data-filtro="todos">Todas</button>
                <button class="filter-btn" data-filtro="CONSIGNACION">Consignaciones</button>
                <button class="filter-btn" data-filtro="RETIRO">Retiros</button>
                <button class="filter-btn" data-filtro="TRANSFERENCIA">Transferencias</button>
                <button class="filter-btn" data-filtro="TARJETA">Tarjeta de Crédito</button>
</div>
        </div>
    </div>

    <div class="transactions-section">
        <div class="transactions-count" id="transactionsCount">0 transacciones encontradas</div>
        <div class="transaction-list" id="transactionList"></div>
    </div>
</div>

<script type="module" src="movimientos.js"></script>
</body>
</html>
