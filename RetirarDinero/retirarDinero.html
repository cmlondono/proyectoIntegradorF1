<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Plata - Retirar Dinero</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="retirarDinero.css">
</head>
<body>

<div class="header">
    <div class="sub-header">
        <div class="logo"><img src="../IMAGENES/LOGO.png" alt="Logo Mi Plata"> Mi Plata</div>
        <div class="nav">
            <a href="#" class="Profile" id="perfilLink">Perfil</a>
            <a href="#" class="logout" id="logoutLink">Cerrar Sesión</a>
        </div>
    </div>
</div>

<div class="container">
    <a class="back" href="../Principal/principal.html" id="backLink">← Volver al panel</a>

    <div class="title">↑ Retirar Dinero</div>
    <div class="subtitle">Extrae fondos de tu cuenta</div>

    <div class="form-section">
        <div class="section-title">Cuenta de origen</div>
        
        <div class="accounts-grid" id="accountsGrid"></div>

        <div class="info-box" id="infoBox">
            <div class="info-icon">i</div>
            <div class="info-text" id="infoText">
                Seleccione una cuenta para ver la información
            </div>
        </div>

        <div class="input-section">
            <div class="section-title">Monto a retirar</div>
            <input type="number" class="amount-input" id="montoInput" placeholder="0" value="0">
            <div class="input-hint" id="inputHint">Máximo disponible: $0</div>
        </div>

        <div class="quick-amounts">
            <div class="section-title">Montos rápidos</div>
            <div class="amounts-grid">
                <button class="quick-btn" data-monto="50000">$ 50.000</button>
                <button class="quick-btn" data-monto="100000">$ 100.000</button>
                <button class="quick-btn" data-monto="200000">$ 200.000</button>
                <button class="quick-btn" data-monto="500000">$ 500.000</button>
            </div>
        </div>

        <button class="submit-btn" id="retirarBtn">↑ Realizar Retiro</button>
        <div id="mensaje" class="mensaje" style="display:none;"></div>
    </div>
</div>

<script type="module" src="retirarDinero.js"></script>
</body>
</html>
