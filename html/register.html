<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Plata - Registro</title>

<link rel="stylesheet" href="../css/register.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <!-- IZQUIERDA -->
    <div class="left-card">
        <div class="logo">
            <div class="logo-icon">
                <img class="icono-miplata" src="../IMAGENES/LOGO.png" alt="Logo">
            </div>
            <span>Mi Plata</span>
        </div>

        <h2>Únete a nuestra familia bancaria</h2>
        <p>Crea tu cuenta en minutos y comienza a disfrutar de todos nuestros beneficios.</p>

        <div class="benefits">
            <div class="benefit">
                <div class="check">✓</div>
                <span>Sin costos de apertura</span>
            </div>

            <div class="benefit">
                <div class="check">✓</div>
                <span>Proceso 100% en línea</span>
            </div>

            <div class="benefit">
                <div class="check">✓</div>
                <span>Activación inmediata</span>
            </div>
        </div>
    </div>

    <!-- DERECHA -->
    <div class="right-card">

        <a href="landingPage.html" class="back">← Volver al inicio</a>

        <h2>Crear Cuenta</h2>
        <div class="subtitle">Completa tus datos para registrarte</div>

        <div class="input-group">
            <label>Número de Identificación</label>
            <input type="text" placeholder="Ej: 1234567890">
        </div>

        <div class="input-group">
            <label>Nombre Completo</label>
            <input type="text" placeholder="Ej: Juan Pérez García">
        </div>

        <div class="input-group">
            <label>Número de Celular</label>
            <input type="text" placeholder="Ej: 3001234567">
        </div>

        <div class="input-group">
            <label>Nombre de Usuario</label>
            <input type="text" placeholder="Ej: juanperez">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" placeholder="********">
        </div>

        <div class="input-group">
            <label>Confirmar Contraseña</label>
            <input type="password" placeholder="********">
        </div>

        <button class="btn">Crear Cuenta</button>

        <div class="links">
            ¿Ya tienes cuenta? <a href="#">Inicia sesión</a>
        </div>

    </div>

</div>

</body>
</html>
