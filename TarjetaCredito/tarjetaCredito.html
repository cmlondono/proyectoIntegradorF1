<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Plata - Tarjeta de Crédito</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="tarjetaCredito.css">
</head>
<body>

<div class="header">
    <div class="sub-header">
        <div class="logo"><img src="../IMAGENES/LOGO.png" alt="Logo Mi Plata"> Mi Plata</div>
        <div class="nav">
            <a href="#" class="Profile" id="perfilLink">Perfil</a>
            <a href="#" class="logout" id="logoutLink">Cerrar Sesión</a>
        </div>
    </div>
</div>

<div class="container">
    <a class="back" href="../Principal/principal.html" id="backLink">← Volver al panel</a>

    <div class="title">💳 Tarjeta de Crédito</div>
    <div class="subtitle">Simula y realiza tus compras a cuotas</div>

    <div class="card-section" id="cardSection"></div>

    <div class="simulator-section">
        <div class="simulator-title">💳 Simulador de Compras</div>

        <div class="simulator-form">
            <div class="form-group">
                <div class="form-label">Seleccionar tarjeta</div>
                <select id="selectTarjeta" class="form-input" style="width:100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
                    <option value="">Seleccione una tarjeta</option>
                </select>
            </div>

            <div class="form-group">
                <div class="form-label">Valor de la compra</div>
                <input type="number" class="form-input" id="montoCompra" placeholder="0" value="0">
                <div class="form-hint" id="maxHint">Máximo disponible: $0</div>
            </div>

            <div class="form-group">
                <div class="form-label">Número de cuotas</div>
                <div class="quotas-grid" id="quotasGrid"></div>
            </div>

            <button class="submit-btn" id="calcularBtn">💳 Calcular y Realizar Compra</button>
            <div id="resultadoSimulacion" class="resultado-simulacion" style="display:none; margin-top: 20px;"></div>
        </div>
    </div>
    
    <div id="mensaje" class="mensaje" style="display:none;"></div>
</div>

<script type="module" src="tarjetaCredito.js"></script>
</body>
</html>
